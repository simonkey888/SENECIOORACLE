name: H011 Runtime Transaction Integration

on:
  pull_request:
    branches:
      - feat/h011-v3-control-plane-coverage
    paths:
      - "polymarket/**"
      - "tests/**"
      - "docs/CURRENT_STATE.md"
      - "research/H-011_v3_raw_artifact_transaction_design.md"
      - ".github/workflows/h011-runtime-transaction-integration.yml"

permissions:
  contents: read

concurrency:
  group: h011-runtime-integration-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  exact-head-baseline:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify exact head and scope
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          expected="${{ github.event.pull_request.head.sha }}"
          test "$actual" = "$expected"
          test "${{ github.event.pull_request.base.ref }}" = "feat/h011-v3-control-plane-coverage"
          git log -1 --format='%H %P %s' | tee /tmp/h011-runtime-head.txt
          git diff --name-status "${{ github.event.pull_request.base.sha }}...$expected" \
            | tee /tmp/h011-runtime-scope.txt
          git diff --check "${{ github.event.pull_request.base.sha }}...$expected" \
            | tee /tmp/h011-runtime-diff-check.txt

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Compile repository Python
        shell: bash
        run: |
          set -o pipefail
          python -m compileall polymarket tests 2>&1 \
            | tee /tmp/h011-runtime-compileall.log

      - name: Invariant compatibility regression
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/cp/test_invariant_compatibility.py \
            tests/cp/test_control_plane.py::TestInvariants -q 2>&1 \
            | tee /tmp/h011-runtime-compatibility.log

      - name: Complete H-011 suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/ -q 2>&1 \
            | tee /tmp/h011-runtime-h011.log

      - name: Global suite — zero failures
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee /tmp/h011-runtime-global.log

      - name: Build Docker image
        shell: bash
        run: |
          set -o pipefail
          docker build \
            -f polymarket/Dockerfile.h011-v3 \
            -t senex-h011-runtime:${{ github.event.pull_request.head.sha }} \
            . 2>&1 | tee /tmp/h011-runtime-docker-build.log

      - name: Start container and validate safety flags
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/h011-runtime-results"
          docker run -d \
            --name senex-h011-runtime \
            -p 18080:8080 \
            -v "${RUNNER_TEMP}/h011-runtime-results:/app/polymarket/results" \
            -e SENECIO_CODE_SHA="${{ github.event.pull_request.head.sha }}" \
            -e H011_PIPELINE_VERSION="integrity-v3" \
            -e PYTHONUNBUFFERED=1 \
            senex-h011-runtime:${{ github.event.pull_request.head.sha }}

          ready=0
          for _ in $(seq 1 120); do
            if curl --fail --silent http://127.0.0.1:18080/healthz \
              -o /tmp/h011-runtime-health.json; then
              ready=1
              break
            fi
            if ! test "$(docker inspect -f '{{.State.Running}}' senex-h011-runtime)" = true; then
              docker logs senex-h011-runtime | tee /tmp/h011-runtime-container.log
              exit 1
            fi
            sleep 2
          done
          test "$ready" = 1

          curl --fail --silent http://127.0.0.1:18080/api/v3/state \
            -o /tmp/h011-runtime-state.json
          curl --fail --silent http://127.0.0.1:18080/api/v3/integrity \
            -o /tmp/h011-runtime-integrity.json
          docker logs senex-h011-runtime | tee /tmp/h011-runtime-container.log

          python - <<'PY'
          import json
          from pathlib import Path
          state = json.loads(Path('/tmp/h011-runtime-state.json').read_text())
          assert state.get('paper_only') is True, state
          assert state.get('orders_enabled') is False, state
          assert state.get('live_capital_locked') is True, state
          PY

      - name: Repository and runtime residue gate
        if: always()
        shell: bash
        run: |
          python - <<'PY' | tee /tmp/h011-runtime-residue.log
          from pathlib import Path
          roots = [Path('.'), Path('${{ runner.temp }}/h011-runtime-results')]
          forbidden = []
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob('*'):
                  if not path.is_file():
                      continue
                  name = path.name
                  if name.endswith('.marker') or '.marker.tmp.' in name:
                      forbidden.append(str(path))
          if forbidden:
              raise SystemExit(f'residual transaction evidence: {forbidden}')
          print('no marker or marker-temp residue')
          PY

      - name: Upload baseline evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: h011-runtime-baseline-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/h011-runtime-*.txt
            /tmp/h011-runtime-*.log
            /tmp/h011-runtime-*.json
            ${{ runner.temp }}/h011-runtime-results
          if-no-files-found: warn
          retention-days: 14

      - name: Stop container
        if: always()
        run: docker rm -f senex-h011-runtime 2>/dev/null || true
