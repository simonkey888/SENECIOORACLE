name: H011 Phase III-A TradingView Research Bridge

on:
  pull_request:
    branches:
      - feat/h011-v3-control-plane-coverage
    paths:
      - "research/tradingview_bridge/**"
      - "docs/CURRENT_STATE.md"
      - ".github/workflows/h011-phase-iiia-tradingview-research.yml"

permissions:
  contents: read

concurrency:
  group: h011-phase-iiia-tradingview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  research-bridge:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify exact head and isolated scope
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          expected="${{ github.event.pull_request.head.sha }}"
          base="${{ github.event.pull_request.base.sha }}"
          test "$actual" = "$expected"
          test "${{ github.event.pull_request.base.ref }}" = "feat/h011-v3-control-plane-coverage"
          git diff --check "$base...$expected" | tee /tmp/phase-iiia-diff-check.log
          git diff --name-status "$base...$expected" | tee /tmp/phase-iiia-files.log
          while IFS=$'\t' read -r status path rest; do
            test -n "$path" || continue
            case "$path" in
              research/tradingview_bridge/*|docs/CURRENT_STATE.md|.github/workflows/h011-phase-iiia-tradingview-research.yml)
                ;;
              *)
                echo "out-of-scope file: $path" >&2
                exit 1
                ;;
            esac
          done < /tmp/phase-iiia-files.log
          ! grep -E 'Dockerfile|requirements|deploy|northflank|raw_chain_v1' /tmp/phase-iiia-files.log

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install existing test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Compile research bridge
        shell: bash
        run: |
          set -o pipefail
          python -m compileall research/tradingview_bridge 2>&1 | tee /tmp/phase-iiia-compileall.log

      - name: Schema adapter security path and provenance tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest research/tradingview_bridge/tests -q \
            2>&1 | tee /tmp/phase-iiia-bridge-tests.log

      - name: Independent architecture isolation gate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' | tee /tmp/phase-iiia-isolation.log
          import json
          import tempfile
          from datetime import datetime, timezone
          from pathlib import Path

          from research.tradingview_bridge.adapter import (
              BridgeSecurityError,
              associate_research_context,
              safe_import_context,
              validate_envelope,
              validate_output_path,
              validate_tool_name,
          )

          fixture = json.loads(Path('research/tradingview_bridge/fixtures/valid_ohlcv.json').read_text())
          result = validate_envelope(
              fixture,
              now=datetime(2026, 7, 21, 12, 6, tzinfo=timezone.utc),
              expected_symbol='BINANCE:BTCUSDT',
              expected_timeframe='5',
          )
          assert result.accepted is True
          assert validate_tool_name('data_get_ohlcv') == 'data_get_ohlcv'
          for blocked in ('ui_eval', 'alert_create', 'pine_save', 'replay_trade', 'indicator_add'):
              try:
                  validate_tool_name(blocked)
              except BridgeSecurityError:
                  pass
              else:
                  raise AssertionError(blocked)

          authoritative = {
              'record_status': 'VALID',
              'invariants': {'pass': 31, 'fail': 0, 'unknown': 0},
              'scan_status': 'COMMITTED',
              'manifest': {'sequence': 9},
              'committed_snapshot': {'sha256': 'a' * 64},
          }
          attached = associate_research_context(authoritative, result)
          for key, value in authoritative.items():
              assert attached[key] == value

          with tempfile.TemporaryDirectory() as tmp:
              root = Path(tmp)
              safe = root / 'research/tradingview_context/context.json'
              safe_import_context(
                  fixture,
                  repo_root=root,
                  output_path=safe,
                  now=datetime(2026, 7, 21, 12, 6, tzinfo=timezone.utc),
              )
              assert safe.exists()
              try:
                  validate_output_path(root / 'results/h011_v3/raw_chain_v1/bad.json', repo_root=root)
              except BridgeSecurityError:
                  pass
              else:
                  raise AssertionError('raw-chain path accepted')

          print('LOCAL_ONLY=true')
          print('AUTHORITATIVE=false')
          print('RAW_CHAIN_INPUT=false')
          print('PRODUCTION_DEPENDENCY=false')
          print('LIVE_TRADINGVIEW_VALIDATION=NOT_EXECUTED')
          PY

      - name: Existing H-011 suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3 -q 2>&1 | tee /tmp/phase-iiia-h011.log

      - name: Existing global suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee /tmp/phase-iiia-global.log

      - name: Package evidence and checksums
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' \
            "validated_head=${{ github.event.pull_request.head.sha }}" \
            "base_sha=${{ github.event.pull_request.base.sha }}" \
            "LOCAL_ONLY=true" \
            "AUTHORITATIVE=false" \
            "RAW_CHAIN_CHANGED=NO" \
            "PR5_CHANGED=NO" \
            "PRODUCTION_CHANGED=NO" \
            "NORTHFLANK_CHANGED=NO" \
            "LIVE_TRADINGVIEW_VALIDATION=NOT_EXECUTED" \
            > /tmp/phase-iiia-summary.txt
          tar -czf /tmp/senex-phase-iiia-exact-checkout.tar.gz .
          sha256sum /tmp/senex-phase-iiia-exact-checkout.tar.gz \
            | tee /tmp/phase-iiia-checkout-sha256.txt
          sha256sum \
            /tmp/phase-iiia-*.log \
            /tmp/phase-iiia-summary.txt \
            /tmp/phase-iiia-files.log \
            /tmp/phase-iiia-checkout-sha256.txt \
            | tee /tmp/phase-iiia-evidence-sha256.txt

      - name: Upload Phase III-A evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: h011-phase-iiia-tradingview-${{ github.event.pull_request.head.sha }}
          retention-days: 14
          if-no-files-found: error
          path: |
            /tmp/phase-iiia-*.log
            /tmp/phase-iiia-*.txt
            /tmp/senex-phase-iiia-exact-checkout.tar.gz
