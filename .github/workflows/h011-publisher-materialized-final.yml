name: H011 Publisher Materialized Final

on:
  pull_request:
    branches:
      - audit/h011-v3-publisher-sol-final-ci-base

permissions:
  contents: read

jobs:
  materialized-publisher-final:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout exact PR head SHA
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify exact materialized SHA and parent
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "1eade0149da220843a7bc3fc756c22a1c543bae2"
          test "$(git rev-parse HEAD^)" = "8ea49b560a808a808bfe498e55a3f4d56603c7e7"
          git diff-tree --no-commit-id --name-only -r HEAD | tee /tmp/h011-final-names.txt
          test "$(cat /tmp/h011-final-names.txt)" = $'polymarket/h011_v3_raw_transaction.py\ntests/h011_v3/test_h011_v3_publish_raw_scan.py'
          git show --stat --oneline HEAD | tee /tmp/h011-final-show.txt
          sha256sum \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            | tee /tmp/h011-final-file-sha256.txt
          grep -F "4d6b859c3ac5596c9d386ceb31dbfa5f53298f526dadcba9bc177a73622b3e99  polymarket/h011_v3_raw_transaction.py" /tmp/h011-final-file-sha256.txt
          grep -F "2ef89875d3d8aad36674d77938006402a3c24310eb689de8082861b694d29696  tests/h011_v3/test_h011_v3_publish_raw_scan.py" /tmp/h011-final-file-sha256.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install H-011 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Compileall
        shell: bash
        run: |
          set -o pipefail
          python -m compileall \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            tests/h011_v3/test_h011_v3_raw_transaction_core.py \
            2>&1 | tee /tmp/h011-final-compileall.log

      - name: Diff check
        shell: bash
        run: |
          set -o pipefail
          git diff-tree --check HEAD^ HEAD 2>&1 | tee /tmp/h011-final-diff-check.log

      - name: Publisher suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_publish_raw_scan.py -q \
            2>&1 | tee /tmp/h011-final-publisher.log

      - name: Transaction core suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_raw_transaction_core.py -q \
            2>&1 | tee /tmp/h011-final-core.log

      - name: Hostile crash matrix
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_publish_crash_audit.py -q \
            2>&1 | tee /tmp/h011-final-crash.log

      - name: Complete H-011 V3 suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/ -q \
            2>&1 | tee /tmp/h011-final-h011.log

      - name: Global suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          python -m pytest -q 2>&1 | tee /tmp/h011-final-global.log
          pytest_status=${PIPESTATUS[0]}
          set -e
          if [ "$pytest_status" -eq 0 ]; then
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          import re
          allowed = (
              "tests/cp/test_control_plane.py::TestInvariants::"
              "test_unknown_not_collapsed_to_zero"
          )
          text = Path("/tmp/h011-final-global.log").read_text(
              encoding="utf-8", errors="replace"
          )
          failed = re.findall(r"^FAILED ([^ ]+)", text, flags=re.MULTILINE)
          if failed != [allowed] or "1 failed" not in text:
              raise SystemExit(f"unexpected global result: {failed}")
          print(f"accepted inherited out-of-scope failure: {allowed}")
          PY

      - name: FD and residue gate
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_one_hundred_publications_have_no_fd_leak \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_happy_path_sequence_zero_exact_bytes_and_cleanup \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_marker_is_removed_after_staging_and_transfer_close \
            -q 2>&1 | tee /tmp/h011-final-fd-residue.log
          python - <<'PY' | tee /tmp/h011-final-repository-residue.log
          from pathlib import Path
          forbidden = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              name = path.name
              if name.endswith(".marker") or ".marker.tmp." in name:
                  forbidden.append(str(path))
              if ".tmp." in name and "__pycache__" not in str(path):
                  forbidden.append(str(path))
          if forbidden:
              raise SystemExit(f"residual transaction evidence: {forbidden}")
          print("no repository marker/temp residues")
          PY

      - name: Upload final materialized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h011-publisher-materialized-final-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/h011-final-names.txt
            /tmp/h011-final-show.txt
            /tmp/h011-final-file-sha256.txt
            /tmp/h011-final-compileall.log
            /tmp/h011-final-diff-check.log
            /tmp/h011-final-publisher.log
            /tmp/h011-final-core.log
            /tmp/h011-final-crash.log
            /tmp/h011-final-h011.log
            /tmp/h011-final-global.log
            /tmp/h011-final-fd-residue.log
            /tmp/h011-final-repository-residue.log
          if-no-files-found: error
          retention-days: 7
