name: H011 Recovery V2 Audit Remediation
# Trigger-only copy; diagnostic rerun 2.

on:
  pull_request:
    branches:
      - feat/h011-v3-transaction-recovery-v2
    paths:
      - ".github/workflows/h011-pr7-recovery-smoke.yml"

permissions:
  contents: write

concurrency:
  group: h011-recovery-v2-audit-remediation
  cancel-in-progress: false

jobs:
  remediate-independent-audit:
    if: github.event.pull_request.head.ref == 'audit/h011-v3-recovery-v2-audit-fix-trigger-2'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/h011-v3-transaction-recovery-v2
          fetch-depth: 1
          show-progress: false

      - name: Verify exact product state
        shell: bash
        run: |
          set -euo pipefail
          echo "f61caba5cf419b9571be80fa09df85000879074c429d54cc8f2f0f78374abee1  polymarket/h011_v3_raw_recovery.py" | sha256sum -c -
          echo "f1a3a8e71f3e8f700e8e0f29742e7e5e58ad9c7eb93a6f612dcb7ef14631dd87  tests/h011_v3/test_h011_v3_recover_raw_transaction.py" | sha256sum -c -
          test -f tools/apply_h011_recovery_v2_audit_fix.py
          test -f .github/workflows/h011-recovery-v2-audit-fix.yml
          test -f .github/workflows/h011-recovery-v2-audit-fix-push.yml

      - name: Apply and validate independent-audit corrections
        shell: bash
        run: |
          set -euo pipefail
          python -u tools/apply_h011_recovery_v2_audit_fix.py
          python -m compileall -q \
            polymarket/h011_v3_raw_recovery.py \
            tests/h011_v3/test_h011_v3_recover_raw_transaction.py
          python -m pytest tests/h011_v3/test_h011_v3_recover_raw_transaction.py -q

      - name: Restore authoritative workflow and commit
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin 725c54032e1df4490f5c0a3c564912d0eaf8ce26
          git checkout FETCH_HEAD -- .github/workflows/h011-pr7-recovery-smoke.yml
          git rm \
            .github/workflows/h011-recovery-v2-audit-fix.yml \
            .github/workflows/h011-recovery-v2-audit-fix-push.yml \
            tools/apply_h011_recovery_v2_audit_fix.py
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            .github/workflows/h011-pr7-recovery-smoke.yml \
            polymarket/h011_v3_raw_recovery.py \
            tests/h011_v3/test_h011_v3_recover_raw_transaction.py
          git commit -m "fix(h011-v3): harden recovery marker discovery"
          git push origin HEAD:feat/h011-v3-transaction-recovery-v2
