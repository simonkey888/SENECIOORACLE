name: H011 Recovery V2 Commit Diagnostic

on:
  pull_request:
    branches:
      - feat/h011-v3-transaction-recovery-v2
    paths:
      - ".github/workflows/h011-pr7-recovery-smoke.yml"

permissions:
  contents: write

jobs:
  diagnose-remediation-commit:
    if: github.event.pull_request.head.ref == 'audit/h011-v3-recovery-v2-audit-fix-trigger-2'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/h011-v3-transaction-recovery-v2
          fetch-depth: 1
          show-progress: false

      - name: Reproduce commit and push
        id: reproduce
        continue-on-error: true
        shell: bash
        run: |
          set +e
          (
            set -euxo pipefail
            echo "f61caba5cf419b9571be80fa09df85000879074c429d54cc8f2f0f78374abee1  polymarket/h011_v3_raw_recovery.py" | sha256sum -c -
            echo "f1a3a8e71f3e8f700e8e0f29742e7e5e58ad9c7eb93a6f612dcb7ef14631dd87  tests/h011_v3/test_h011_v3_recover_raw_transaction.py" | sha256sum -c -
            python tools/apply_h011_recovery_v2_audit_fix.py
            echo "ed5126ef2f7993b58307d45494b212314e4a1f369b7821e87fc677739bae8eb0  polymarket/h011_v3_raw_recovery.py" | sha256sum -c -
            echo "04fe3c9223698b0245a1d2230f0f3b3df18e7497fee8755a1fb4304ae354e0b3  tests/h011_v3/test_h011_v3_recover_raw_transaction.py" | sha256sum -c -
            git rm -f tools/apply_h011_recovery_v2_audit_fix.py tools/h011-pr7-recovery-smoke-authoritative.yml
            git diff --check
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add polymarket/h011_v3_raw_recovery.py tests/h011_v3/test_h011_v3_recover_raw_transaction.py
            git status --short
            git commit -m "fix(h011-v3): harden recovery marker discovery"
            git push origin HEAD:feat/h011-v3-transaction-recovery-v2
          ) > /tmp/h011-commit-diagnostic.log 2>&1
          status=$?
          echo "status=$status" > /tmp/h011-commit-diagnostic-status.log
          cat /tmp/h011-commit-diagnostic.log
          exit "$status"

      - name: Upload commit diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: h011-recovery-v2-commit-diagnostic-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/h011-commit-diagnostic.log
            /tmp/h011-commit-diagnostic-status.log
          if-no-files-found: error
          retention-days: 7

      - name: Fail after diagnostic
        if: steps.reproduce.outcome != 'success'
        run: exit 1
