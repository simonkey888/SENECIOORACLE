name: H011 Recovery V2 Audit
# Authoritative read-only gate for the hardened recovery branch.

on:
  pull_request:
    branches:
      - feat/h011-v3-control-plane-coverage
    paths:
      - "polymarket/h011_v3_raw_recovery.py"
      - "tests/h011_v3/test_h011_v3_recover_raw_transaction.py"
      - ".github/workflows/h011-pr7-recovery-smoke.yml"

permissions:
  contents: read

concurrency:
  group: h011-recovery-v2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  recovery-hostile-audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 40

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify base, scope, and publisher identity
        shell: bash
        run: |
          set -euo pipefail
          test "${{ github.event.pull_request.base.ref }}" = "feat/h011-v3-control-plane-coverage"
          test "${{ github.event.pull_request.base.sha }}" = "adaf4cdd12662a96000785599cceabb5c60e2c63"
          git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" | sort | tee /tmp/h011-recovery-names.txt
          test "$(cat /tmp/h011-recovery-names.txt)" = $'.github/workflows/h011-pr7-recovery-smoke.yml\npolymarket/h011_v3_raw_recovery.py\ntests/h011_v3/test_h011_v3_recover_raw_transaction.py'
          git diff --stat "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" | tee /tmp/h011-recovery-stat.txt
          git diff --check "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" | tee /tmp/h011-recovery-diff-check.log
          sha256sum \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            polymarket/h011_v3_raw_recovery.py \
            tests/h011_v3/test_h011_v3_recover_raw_transaction.py \
            | tee /tmp/h011-recovery-file-sha256.txt
          grep -F "4d6b859c3ac5596c9d386ceb31dbfa5f53298f526dadcba9bc177a73622b3e99  polymarket/h011_v3_raw_transaction.py" /tmp/h011-recovery-file-sha256.txt
          grep -F "2ef89875d3d8aad36674d77938006402a3c24310eb689de8082861b694d29696  tests/h011_v3/test_h011_v3_publish_raw_scan.py" /tmp/h011-recovery-file-sha256.txt
          git log -1 --format='%H %P %s' | tee /tmp/h011-recovery-head.txt

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install H-011 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Compile transaction and recovery modules
        shell: bash
        run: |
          set -o pipefail
          python -m compileall \
            polymarket/h011_v3_raw_transaction.py \
            polymarket/h011_v3_raw_recovery.py \
            tests/h011_v3/test_h011_v3_recover_raw_transaction.py \
            2>&1 | tee /tmp/h011-recovery-compileall.log

      - name: Recovery focused suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_recover_raw_transaction.py -q \
            2>&1 | tee /tmp/h011-recovery-focused.log

      - name: Publisher regression suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_publish_raw_scan.py -q \
            2>&1 | tee /tmp/h011-recovery-publisher.log

      - name: Transaction core regression suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_raw_transaction_core.py -q \
            2>&1 | tee /tmp/h011-recovery-core.log

      - name: Publisher hostile crash regression
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_publish_crash_audit.py -q \
            2>&1 | tee /tmp/h011-recovery-publisher-crash.log

      - name: Complete H-011 V3 suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/ -q \
            2>&1 | tee /tmp/h011-recovery-h011.log

      - name: Global suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          python -m pytest -q 2>&1 | tee /tmp/h011-recovery-global.log
          pytest_status=${PIPESTATUS[0]}
          set -e
          if [ "$pytest_status" -eq 0 ]; then
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          import re
          allowed = (
              "tests/cp/test_control_plane.py::TestInvariants::"
              "test_unknown_not_collapsed_to_zero"
          )
          text = Path("/tmp/h011-recovery-global.log").read_text(
              encoding="utf-8", errors="replace"
          )
          failed = re.findall(r"^FAILED ([^ ]+)", text, flags=re.MULTILINE)
          if failed != [allowed] or "1 failed" not in text:
              raise SystemExit(f"unexpected global result: {failed}")
          print(f"accepted inherited out-of-scope failure: {allowed}")
          PY

      - name: Repository residue gate
        shell: bash
        run: |
          python - <<'PY' | tee /tmp/h011-recovery-residue.log
          from pathlib import Path
          forbidden = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              name = path.name
              if name.endswith(".marker") or ".marker.tmp." in name:
                  forbidden.append(str(path))
              if ".tmp." in name and "__pycache__" not in str(path):
                  forbidden.append(str(path))
          if forbidden:
              raise SystemExit(f"residual transaction evidence: {forbidden}")
          print("no repository marker/temp residues")
          PY

      - name: Upload recovery evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: h011-recovery-v2-${{ github.event.pull_request.head.sha }}
          path: |
            /tmp/h011-recovery-names.txt
            /tmp/h011-recovery-stat.txt
            /tmp/h011-recovery-diff-check.log
            /tmp/h011-recovery-file-sha256.txt
            /tmp/h011-recovery-head.txt
            /tmp/h011-recovery-compileall.log
            /tmp/h011-recovery-focused.log
            /tmp/h011-recovery-publisher.log
            /tmp/h011-recovery-core.log
            /tmp/h011-recovery-publisher-crash.log
            /tmp/h011-recovery-h011.log
            /tmp/h011-recovery-global.log
            /tmp/h011-recovery-residue.log
          if-no-files-found: error
          retention-days: 7
