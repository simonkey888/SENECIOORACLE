name: H011 Recovery V2 Audit Remediation
# Trigger-only copy; normalized EOF materialization.

on:
  pull_request:
    branches:
      - feat/h011-v3-transaction-recovery-v2
    paths:
      - ".github/workflows/h011-pr7-recovery-smoke.yml"

permissions:
  contents: write

concurrency:
  group: h011-recovery-v2-audit-remediation
  cancel-in-progress: false

jobs:
  remediate-independent-audit:
    if: github.event.pull_request.head.ref == 'audit/h011-v3-recovery-v2-commit-diagnostic'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/h011-v3-transaction-recovery-v2
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install H-011 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Verify and apply audit corrections
        shell: bash
        run: |
          set -euo pipefail
          echo "f61caba5cf419b9571be80fa09df85000879074c429d54cc8f2f0f78374abee1  polymarket/h011_v3_raw_recovery.py" | sha256sum -c -
          echo "f1a3a8e71f3e8f700e8e0f29742e7e5e58ad9c7eb93a6f612dcb7ef14631dd87  tests/h011_v3/test_h011_v3_recover_raw_transaction.py" | sha256sum -c -
          test -f tools/apply_h011_recovery_v2_audit_fix.py
          python tools/apply_h011_recovery_v2_audit_fix.py
          python - <<'PY'
          from pathlib import Path
          path = Path("tests/h011_v3/test_h011_v3_recover_raw_transaction.py")
          path.write_text(path.read_text(encoding="utf-8").rstrip() + "\n", encoding="utf-8")
          PY
          python -m compileall -q polymarket/h011_v3_raw_recovery.py tests/h011_v3/test_h011_v3_recover_raw_transaction.py
          python -m pytest tests/h011_v3/test_h011_v3_recover_raw_transaction.py -q
          echo "ed5126ef2f7993b58307d45494b212314e4a1f369b7821e87fc677739bae8eb0  polymarket/h011_v3_raw_recovery.py" | sha256sum -c -
          echo "de1d8237e2874055771a3e273e7c225662a00bcb9e0a55f505bf620a3456f5d7  tests/h011_v3/test_h011_v3_recover_raw_transaction.py" | sha256sum -c -

      - name: Commit product-only remediation
        shell: bash
        run: |
          set -euo pipefail
          git rm -f tools/apply_h011_recovery_v2_audit_fix.py tools/h011-pr7-recovery-smoke-authoritative.yml
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add polymarket/h011_v3_raw_recovery.py tests/h011_v3/test_h011_v3_recover_raw_transaction.py
          git status --short
          git commit -m "fix(h011-v3): harden recovery marker discovery"
          git push origin HEAD:feat/h011-v3-transaction-recovery-v2
