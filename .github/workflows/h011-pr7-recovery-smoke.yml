name: H011 Recovery V2 Audit Remediation
# Trigger-only copy; capture patched files.

on:
  pull_request:
    branches:
      - feat/h011-v3-transaction-recovery-v2
    paths:
      - ".github/workflows/h011-pr7-recovery-smoke.yml"

permissions:
  contents: write

concurrency:
  group: h011-recovery-v2-audit-remediation
  cancel-in-progress: false

jobs:
  remediate-independent-audit:
    if: github.event.pull_request.head.ref == 'audit/h011-v3-recovery-v2-audit-fix-trigger-2'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/h011-v3-transaction-recovery-v2
          fetch-depth: 1
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install H-011 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Verify exact product state
        shell: bash
        run: |
          set -euo pipefail
          echo "f61caba5cf419b9571be80fa09df85000879074c429d54cc8f2f0f78374abee1  polymarket/h011_v3_raw_recovery.py" | sha256sum -c -
          echo "f1a3a8e71f3e8f700e8e0f29742e7e5e58ad9c7eb93a6f612dcb7ef14631dd87  tests/h011_v3/test_h011_v3_recover_raw_transaction.py" | sha256sum -c -
          test -f tools/apply_h011_recovery_v2_audit_fix.py

      - name: Apply and validate independent-audit corrections
        id: audit_fix
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -u tools/apply_h011_recovery_v2_audit_fix.py > /tmp/h011-audit-patcher.log 2>&1
          patch_status=$?
          echo "patch_status=$patch_status" | tee /tmp/h011-audit-status.log
          if [ "$patch_status" -ne 0 ]; then exit "$patch_status"; fi
          python -m compileall -q polymarket/h011_v3_raw_recovery.py tests/h011_v3/test_h011_v3_recover_raw_transaction.py > /tmp/h011-audit-compile.log 2>&1
          compile_status=$?
          echo "compile_status=$compile_status" | tee -a /tmp/h011-audit-status.log
          if [ "$compile_status" -ne 0 ]; then exit "$compile_status"; fi
          python -m pytest tests/h011_v3/test_h011_v3_recover_raw_transaction.py -q > /tmp/h011-audit-focused.log 2>&1
          test_status=$?
          echo "test_status=$test_status" | tee -a /tmp/h011-audit-status.log
          cat /tmp/h011-audit-focused.log
          sha256sum polymarket/h011_v3_raw_recovery.py tests/h011_v3/test_h011_v3_recover_raw_transaction.py > /tmp/h011-audit-patched-sha256.txt
          exit "$test_status"

      - name: Upload patched files and diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: h011-recovery-v2-patched-${{ github.event.pull_request.head.sha }}
          path: |
            polymarket/h011_v3_raw_recovery.py
            tests/h011_v3/test_h011_v3_recover_raw_transaction.py
            /tmp/h011-audit-status.log
            /tmp/h011-audit-patcher.log
            /tmp/h011-audit-compile.log
            /tmp/h011-audit-focused.log
            /tmp/h011-audit-patched-sha256.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail job if remediation failed
        if: steps.audit_fix.outcome != 'success'
        run: exit 1
