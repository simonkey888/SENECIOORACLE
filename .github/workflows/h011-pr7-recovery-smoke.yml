name: H011 PR7 Recovery Smoke

on:
  pull_request:
    branches:
      - feat/h011-v3-transaction-publisher
    paths:
      - "polymarket/h011_v3_raw_transaction.py"
      - "polymarket/h011_v3_raw_recovery.py"
      - "polymarket/requirements-h011-v3.txt"
      - "tests/h011_v3/**"
      - ".github/workflows/h011-pr7-recovery-smoke.yml"

permissions:
  contents: read

concurrency:
  group: h011-pr7-recovery-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  recovery-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install H-011 test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Compile raw transaction modules
        run: python -m compileall -q polymarket/h011_v3_raw_transaction.py polymarket/h011_v3_raw_recovery.py

      - name: Check patch whitespace
        run: git diff --check "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

      - name: Run H-011 V3 suite
        run: python -m pytest tests/h011_v3/ -q
