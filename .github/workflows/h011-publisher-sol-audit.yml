name: H011 Publisher SOL Audit

on:
  pull_request:
    branches:
      - feat/h011-v3-discovery-refresh
    paths:
      - "polymarket/h011_v3_raw_transaction.py"
      - "tests/h011_v3/**"
      - "tools/apply_h011_publisher_audit_patch.py"
      - "tools/apply_h011_publisher_audit_regression_patch.py"
      - ".github/workflows/h011-publisher-sol-audit.yml"

permissions:
  contents: write

concurrency:
  group: h011-publisher-materialization-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publisher-materialization-candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout validation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install H-011 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Build and hash exact validated patch
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_h011_publisher_audit_patch.py
          python tools/apply_h011_publisher_audit_regression_patch.py
          git diff --check
          git diff -- \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            > /tmp/h011-publisher-hardening.patch
          test -s /tmp/h011-publisher-hardening.patch
          patch_sha=$(sha256sum /tmp/h011-publisher-hardening.patch | awk '{print $1}')
          test "$patch_sha" = "8dea2e547b95116b3d0c029a0d5ce2d3cbe8e2cc6629fd2f0efeb5784712478d"
          printf '%s\n' "$patch_sha" > /tmp/h011-patch-sha256.txt
          printf '%s\n' "bf44af4b00365b28d8742d93f48b4dc0c3069b149c0166fc41c6c15eae8c2a33" > /tmp/h011-source-zip-sha256.txt

      - name: Prepare exact PR8 parent
        shell: bash
        run: |
          set -euo pipefail
          git reset --hard
          git clean -fdx
          git fetch origin
          remote_head=$(git rev-parse origin/audit/h011-v3-publisher-sol)
          test "$remote_head" = "8ea49b560a808a808bfe498e55a3f4d56603c7e7"
          git switch --detach "$remote_head"
          test -z "$(git status --short)"
          printf '%s\n' "$remote_head" > /tmp/h011-materialization-parent.txt

      - name: Apply exact patch and verify file identities
        shell: bash
        run: |
          set -euo pipefail
          git apply --check /tmp/h011-publisher-hardening.patch
          git apply /tmp/h011-publisher-hardening.patch
          git diff --check
          git diff --name-only | tee /tmp/h011-materialization-names.txt
          git diff --stat | tee /tmp/h011-materialization-stat.txt
          git diff > /tmp/h011-materialization.diff
          python - <<'PY'
          from pathlib import Path
          expected = [
              "polymarket/h011_v3_raw_transaction.py",
              "tests/h011_v3/test_h011_v3_publish_raw_scan.py",
          ]
          observed = Path("/tmp/h011-materialization-names.txt").read_text(encoding="utf-8").splitlines()
          if observed != expected:
              raise SystemExit(f"scope mismatch: {observed} != {expected}")
          PY
          file_hashes=$(sha256sum \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py)
          printf '%s\n' "$file_hashes" | tee /tmp/h011-materialized-file-sha256.txt
          grep -F "4d6b859c3ac5596c9d386ceb31dbfa5f53298f526dadcba9bc177a73622b3e99  polymarket/h011_v3_raw_transaction.py" /tmp/h011-materialized-file-sha256.txt
          grep -F "2ef89875d3d8aad36674d77938006402a3c24310eb689de8082861b694d29696  tests/h011_v3/test_h011_v3_publish_raw_scan.py" /tmp/h011-materialized-file-sha256.txt

      - name: Compileall
        run: |
          python -m compileall \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            tests/h011_v3/test_h011_v3_raw_transaction_core.py \
            2>&1 | tee /tmp/h011-materialization-compileall.log

      - name: Publisher suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_publish_raw_scan.py -q \
            2>&1 | tee /tmp/h011-materialization-publisher.log

      - name: Transaction core suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_raw_transaction_core.py -q \
            2>&1 | tee /tmp/h011-materialization-core.log

      - name: Complete H-011 V3 suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/ -q \
            2>&1 | tee /tmp/h011-materialization-h011.log

      - name: Global suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          python -m pytest -q 2>&1 | tee /tmp/h011-materialization-global.log
          pytest_status=${PIPESTATUS[0]}
          set -e
          if [ "$pytest_status" -eq 0 ]; then
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          import re
          allowed = (
              "tests/cp/test_control_plane.py::TestInvariants::"
              "test_unknown_not_collapsed_to_zero"
          )
          text = Path("/tmp/h011-materialization-global.log").read_text(
              encoding="utf-8", errors="replace"
          )
          failed = re.findall(r"^FAILED ([^ ]+)", text, flags=re.MULTILINE)
          if failed != [allowed] or "1 failed" not in text:
              raise SystemExit(f"unexpected global result: {failed}")
          print(f"accepted inherited out-of-scope failure: {allowed}")
          PY

      - name: Final scope and residue gate
        shell: bash
        run: |
          set -euo pipefail
          git diff --check 2>&1 | tee /tmp/h011-materialization-diff-check.log
          python - <<'PY' | tee /tmp/h011-materialization-residue.log
          from pathlib import Path
          forbidden = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              name = path.name
              if name.endswith(".marker") or ".marker.tmp." in name:
                  forbidden.append(str(path))
              if ".tmp." in name and "__pycache__" not in str(path):
                  forbidden.append(str(path))
          if forbidden:
              raise SystemExit(f"residual transaction evidence: {forbidden}")
          print("no repository marker/temp residues")
          PY

      - name: Create exactly one candidate commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SeneX Publisher Audit"
          git config user.email "actions@users.noreply.github.com"
          git add \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py
          git diff --cached --check
          git diff --cached --name-only | tee /tmp/h011-staged-names.txt
          test "$(cat /tmp/h011-staged-names.txt)" = $'polymarket/h011_v3_raw_transaction.py\ntests/h011_v3/test_h011_v3_publish_raw_scan.py'
          git commit -m "fix(h011-v3): harden publisher crash consistency"
          candidate=$(git rev-parse HEAD)
          parent=$(git rev-parse HEAD^)
          test "$parent" = "8ea49b560a808a808bfe498e55a3f4d56603c7e7"
          test "$(git rev-list --count "$parent..$candidate")" = "1"
          printf '%s\n' "$candidate" | tee /tmp/h011-candidate-sha.txt
          printf '%s\n' "$parent" > /tmp/h011-candidate-parent.txt
          git show --format=fuller --stat "$candidate" > /tmp/h011-candidate-show.txt
          git diff-tree --no-commit-id --name-only -r "$candidate" > /tmp/h011-candidate-names.txt
          test "$(cat /tmp/h011-candidate-names.txt)" = $'polymarket/h011_v3_raw_transaction.py\ntests/h011_v3/test_h011_v3_publish_raw_scan.py'

      - name: Publish candidate commit to isolated branch
        shell: bash
        run: |
          set -euo pipefail
          git push origin HEAD:refs/heads/audit/h011-v3-publisher-sol-materialized-candidate

      - name: Upload candidate evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h011-publisher-materialization-candidate-${{ github.sha }}
          path: |
            /tmp/h011-publisher-hardening.patch
            /tmp/h011-patch-sha256.txt
            /tmp/h011-source-zip-sha256.txt
            /tmp/h011-materialization-parent.txt
            /tmp/h011-materialization-names.txt
            /tmp/h011-materialization-stat.txt
            /tmp/h011-materialization.diff
            /tmp/h011-materialized-file-sha256.txt
            /tmp/h011-materialization-compileall.log
            /tmp/h011-materialization-publisher.log
            /tmp/h011-materialization-core.log
            /tmp/h011-materialization-h011.log
            /tmp/h011-materialization-global.log
            /tmp/h011-materialization-diff-check.log
            /tmp/h011-materialization-residue.log
            /tmp/h011-staged-names.txt
            /tmp/h011-candidate-sha.txt
            /tmp/h011-candidate-parent.txt
            /tmp/h011-candidate-show.txt
            /tmp/h011-candidate-names.txt
          if-no-files-found: error
          retention-days: 7
