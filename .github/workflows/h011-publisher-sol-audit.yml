name: H011 Publisher SOL Audit

# Validation PR trigger: workflow already exists in the audit base branch.
on:
  push:
    branches:
      - audit/h011-v3-publisher-sol
  pull_request:
    branches:
      - feat/h011-v3-transaction-publisher
      - audit/h011-v3-publisher-sol
      - feat/h011-v3-discovery-refresh
    paths:
      - "polymarket/h011_v3_raw_transaction.py"
      - "tests/h011_v3/**"
      - "tools/apply_h011_publisher_audit_patch.py"
      - "tools/apply_h011_publisher_audit_regression_patch.py"
      - "audit/APPROVE_H011_PUBLISHER_MATERIALIZATION"
      - ".github/workflows/h011-publisher-sol-audit.yml"

permissions:
  contents: write

concurrency:
  group: h011-publisher-sol-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publisher-hostile-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install H-011 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Apply one-shot hostile-audit hardening
        id: patch
        shell: bash
        run: |
          applied=false
          for patcher in \
            tools/apply_h011_publisher_audit_patch.py \
            tools/apply_h011_publisher_audit_regression_patch.py
          do
            if [ -f "$patcher" ]; then
              python "$patcher"
              rm "$patcher"
              applied=true
            fi
          done
          echo "applied=$applied" >> "$GITHUB_OUTPUT"

      - name: Compile hardened publisher and tests
        shell: bash
        run: |
          set -o pipefail
          python -m compileall -q \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_raw_transaction_core.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            tests/h011_v3/test_h011_v3_publish_crash_audit.py \
            2>&1 | tee /tmp/h011-compileall.log

      - name: Verify patch whitespace
        shell: bash
        run: |
          set -o pipefail
          git diff --check 2>&1 | tee /tmp/h011-diff-check.log

      - name: Run hostile crash matrix
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/h011_v3/test_h011_v3_publish_crash_audit.py \
            -q 2>&1 | tee /tmp/h011-hostile-crash-audit.log

      - name: Run publisher regression suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            -q 2>&1 | tee /tmp/h011-publisher-regression.log

      - name: Run raw transaction core suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/h011_v3/test_h011_v3_raw_transaction_core.py \
            -q 2>&1 | tee /tmp/h011-raw-transaction-core.log

      - name: Re-run explicit FD leak and residue gate
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_one_hundred_publications_have_no_fd_leak \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_happy_path_sequence_zero_exact_bytes_and_cleanup \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_marker_is_removed_after_staging_and_transfer_close \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_two_processes_compete_and_leave_valid_contiguous_chain \
            -q 2>&1 | tee /tmp/h011-fd-residue-gate.log

      - name: Run complete H-011 V3 suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/ -q \
            2>&1 | tee /tmp/h011-complete-suite.log

      - name: Run global suite with only inherited failure allowed
        shell: bash
        run: |
          set +e
          set -o pipefail
          python -m pytest -q 2>&1 | tee /tmp/h011-global-suite.log
          pytest_status=${PIPESTATUS[0]}
          set -e
          if [ "$pytest_status" -eq 0 ]; then
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          allowed = (
              "tests/cp/test_control_plane.py::TestInvariants::"
              "test_unknown_not_collapsed_to_zero"
          )
          text = Path("/tmp/h011-global-suite.log").read_text(
              encoding="utf-8", errors="replace"
          )
          failed = re.findall(r"^FAILED ([^ ]+)", text, flags=re.MULTILINE)
          if failed != [allowed]:
              print(f"unexpected global failures: {failed}", file=sys.stderr)
              raise SystemExit(1)
          if "1 failed" not in text:
              print("global failure summary is not exactly one failure", file=sys.stderr)
              raise SystemExit(1)
          print(f"accepted inherited out-of-scope failure: {allowed}")
          PY

      - name: Capture and validate exact materialization diff
        if: success()
        shell: bash
        run: |
          git diff -- \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            > /tmp/h011-publisher-hardening.patch
          git diff --name-only > /tmp/h011-all-diff-names.txt
          git diff --stat > /tmp/h011-all-diff-stat.txt
          git diff --name-only -- \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            > /tmp/h011-materialization-names.txt
          python - <<'PY'
          from pathlib import Path

          expected = [
              "polymarket/h011_v3_raw_transaction.py",
              "tests/h011_v3/test_h011_v3_publish_raw_scan.py",
          ]
          observed = Path("/tmp/h011-materialization-names.txt").read_text(
              encoding="utf-8"
          ).splitlines()
          if observed != expected:
              raise SystemExit(
                  f"materialization scope mismatch: {observed} != {expected}"
              )
          PY
          git diff --check
          test -s /tmp/h011-publisher-hardening.patch

      - name: Upload publisher audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h011-publisher-sol-audit-${{ github.sha }}
          path: |
            /tmp/h011-compileall.log
            /tmp/h011-diff-check.log
            /tmp/h011-hostile-crash-audit.log
            /tmp/h011-publisher-regression.log
            /tmp/h011-raw-transaction-core.log
            /tmp/h011-fd-residue-gate.log
            /tmp/h011-complete-suite.log
            /tmp/h011-global-suite.log
            /tmp/h011-publisher-hardening.patch
            /tmp/h011-all-diff-names.txt
            /tmp/h011-all-diff-stat.txt
            /tmp/h011-materialization-names.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Materialize validated hardening on audit branch
        if: >-
          success() &&
          github.event_name == 'pull_request' &&
          github.head_ref == 'audit/h011-v3-publisher-sol-validation' &&
          steps.patch.outputs.applied == 'true' &&
          hashFiles('audit/APPROVE_H011_PUBLISHER_MATERIALIZATION') != ''
        shell: bash
        run: |
          git switch --force-create \
            audit/h011-v3-publisher-sol \
            origin/audit/h011-v3-publisher-sol
          git apply --check /tmp/h011-publisher-hardening.patch
          git apply /tmp/h011-publisher-hardening.patch
          git rm tools/apply_h011_publisher_audit_patch.py

          git status --short
          git diff --name-only
          git diff --stat
          git diff --check
          git config user.name "SeneX Publisher Audit CI"
          git config user.email "actions@users.noreply.github.com"
          git add \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            tools/apply_h011_publisher_audit_patch.py
          git diff --cached --check
          git commit -m "fix(h011-v3): harden publisher crash consistency"
          git push origin "HEAD:audit/h011-v3-publisher-sol"
