name: H011 Publisher SOL Audit

on:
  pull_request:
    branches:
      - feat/h011-v3-discovery-refresh
    paths:
      - "polymarket/h011_v3_raw_transaction.py"
      - "tests/h011_v3/**"
      - "tools/apply_h011_publisher_audit_patch.py"
      - "tools/apply_h011_publisher_audit_regression_patch.py"
      - ".github/workflows/h011-publisher-sol-audit.yml"

permissions:
  contents: read

concurrency:
  group: h011-publisher-sol-exact-ephemeral-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publisher-exact-ephemeral-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout validation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install H-011 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Build exact validated patch
        shell: bash
        run: |
          python tools/apply_h011_publisher_audit_patch.py
          python tools/apply_h011_publisher_audit_regression_patch.py
          git diff --check
          git diff -- \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            > /tmp/h011-publisher-hardening.patch
          test -s /tmp/h011-publisher-hardening.patch

      - name: Prepare clean detached audit checkout
        shell: bash
        run: |
          git reset --hard
          git clean -fdx
          git switch --detach origin/audit/h011-v3-publisher-sol
          test "$(git rev-parse HEAD)" = "8ea49b560a808a808bfe498e55a3f4d56603c7e7"
          test -z "$(git status --short)"
          git rev-parse HEAD | tee /tmp/h011-detached-head.txt
          git status --short | tee /tmp/h011-preapply-status.txt

      - name: Apply patch ephemerally and inspect exact scope
        shell: bash
        run: |
          git apply --check /tmp/h011-publisher-hardening.patch
          echo PASS | tee /tmp/h011-git-apply-check.txt
          git apply /tmp/h011-publisher-hardening.patch
          git diff --name-only | tee /tmp/h011-applied-names.txt
          git diff --stat | tee /tmp/h011-applied-stat.txt
          git diff > /tmp/h011-applied.diff
          python - <<'PY'
          from pathlib import Path

          expected = [
              "polymarket/h011_v3_raw_transaction.py",
              "tests/h011_v3/test_h011_v3_publish_raw_scan.py",
          ]
          observed = Path("/tmp/h011-applied-names.txt").read_text(
              encoding="utf-8"
          ).splitlines()
          if observed != expected:
              raise SystemExit(f"scope mismatch: {observed} != {expected}")

          forbidden = (
              ".github/",
              "audit/",
              "tools/",
              "polymarket/results/",
          )
          if any(name.startswith(forbidden) for name in observed):
              raise SystemExit(f"forbidden path in patch: {observed}")

          source = Path("polymarket/h011_v3_raw_transaction.py").read_text(
              encoding="utf-8"
          )
          test = Path(
              "tests/h011_v3/test_h011_v3_publish_raw_scan.py"
          ).read_text(encoding="utf-8")

          if "chmod(0o644)" in source or "chmod(0o444)" in source:
              raise SystemExit("product source relaxes sealed file modes")

          fixture = test.split('if mutation == "hash":', 1)[1].split(
              'elif mutation == "gap":', 1
          )[0]
          ordered_fixture_tokens = [
              "manifest_path.chmod(0o644)",
              "try:",
              "manifest_path.write_bytes",
              "finally:",
              "manifest_path.chmod(0o444)",
          ]
          positions = [fixture.find(token) for token in ordered_fixture_tokens]
          if any(position < 0 for position in positions):
              raise SystemExit(f"fixture restore missing: {positions}")
          if positions != sorted(positions):
              raise SystemExit("fixture does not restore 0444 in finally")

          short_write = test.split(
              "def test_short_write_preserves_marker_and_staging", 1
          )[1].split("\ndef ", 1)[0]
          required_short_write = [
              "FAULT_PUBLISH_AFTER_ARTIFACT_MARKER_UPDATE",
              "armed = True",
              "return 0",
              "assert injected is True",
              'durable_marker_status == "ARTIFACT_PUBLISHED"',
              "transfer_consumed is True",
              "transfer._closed is True",
              'marker["status"] == "ARTIFACT_PUBLISHED"',
              'assert not (raw_dir / f"{sealed.final_name}.sha256").exists()',
              'assert not (raw_dir / "manifest_000000.json").exists()',
              "assert not _temps(raw_dir)",
          ]
          for token in required_short_write:
              if token not in short_write:
                  raise SystemExit(f"missing short-write invariant: {token}")
          PY

      - name: Run exact publisher suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_publish_raw_scan.py -q \
            2>&1 | tee /tmp/h011-exact-publisher.log

      - name: Run exact transaction core suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_raw_transaction_core.py -q \
            2>&1 | tee /tmp/h011-exact-core.log

      - name: Run exact compileall
        shell: bash
        run: |
          set -o pipefail
          python -m compileall polymarket/h011_v3_raw_transaction.py \
            2>&1 | tee /tmp/h011-exact-compileall.log

      - name: Run exact diff check
        shell: bash
        run: |
          set -o pipefail
          git diff --check 2>&1 | tee /tmp/h011-exact-diff-check.log

      - name: Verify FD leak test coverage and repository residues
        shell: bash
        run: |
          python - <<'PY' | tee /tmp/h011-fd-residue-evidence.log
          from pathlib import Path

          publisher_test = Path(
              "tests/h011_v3/test_h011_v3_publish_raw_scan.py"
          ).read_text(encoding="utf-8")
          required = [
              "def test_one_hundred_publications_have_no_fd_leak",
              'baseline = len(os.listdir("/proc/self/fd"))',
              'assert len(os.listdir("/proc/self/fd")) == baseline',
              "assert not _markers(raw_dir)",
              "assert not _temps(raw_dir)",
          ]
          for token in required:
              if token not in publisher_test:
                  raise SystemExit(f"missing FD/residue assertion: {token}")

          residues = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              name = path.name
              if name.endswith(".marker") or ".marker.tmp." in name:
                  residues.append(str(path))
              elif ".tmp." in name and "__pycache__" not in str(path):
                  residues.append(str(path))
          if residues:
              raise SystemExit(f"repository transaction residues: {residues}")
          print("publisher suite includes explicit zero-FD-leak gate")
          print("publisher suite includes zero marker/temp residue assertions")
          print("no repository transaction residues after tests")
          PY

      - name: Discard ephemeral checkout and prove cleanliness
        if: always()
        shell: bash
        run: |
          git reset --hard
          git clean -fdx
          test "$(git rev-parse HEAD)" = "8ea49b560a808a808bfe498e55a3f4d56603c7e7"
          git status --short | tee /tmp/h011-postdiscard-status.txt
          test -z "$(cat /tmp/h011-postdiscard-status.txt)"
          echo "no commit or push step exists in this workflow" \
            | tee /tmp/h011-nonmutation-proof.txt

      - name: Upload exact non-mutating evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h011-publisher-exact-ephemeral-${{ github.sha }}
          path: |
            /tmp/h011-publisher-hardening.patch
            /tmp/h011-detached-head.txt
            /tmp/h011-preapply-status.txt
            /tmp/h011-git-apply-check.txt
            /tmp/h011-applied-names.txt
            /tmp/h011-applied-stat.txt
            /tmp/h011-applied.diff
            /tmp/h011-exact-publisher.log
            /tmp/h011-exact-core.log
            /tmp/h011-exact-compileall.log
            /tmp/h011-exact-diff-check.log
            /tmp/h011-fd-residue-evidence.log
            /tmp/h011-postdiscard-status.txt
            /tmp/h011-nonmutation-proof.txt
          if-no-files-found: warn
          retention-days: 7
