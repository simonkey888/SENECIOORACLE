name: H011 Publisher SOL Audit

on:
  push:
    branches:
      - feat/h011-v3-transaction-publisher
  pull_request:
    branches:
      - feat/h011-v3-transaction-publisher
    paths:
      - "polymarket/h011_v3_raw_transaction.py"
      - "tests/h011_v3/**"
      - "audit/H011_PUBLISHER_SOL_FINDINGS.md"
      - ".github/workflows/h011-publisher-sol-audit.yml"

permissions:
  contents: read

concurrency:
  group: h011-publisher-sol-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publisher-hostile-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout exact event head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Verify materialized state and audit scope
        shell: bash
        run: |
          set -euo pipefail
          test ! -e tools/apply_h011_publisher_audit_patch.py
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags origin feat/h011-v3-transaction-publisher
            git diff --name-only origin/feat/h011-v3-transaction-publisher...HEAD | sort | tee /tmp/h011-audit-names.txt
            python - <<'PY'
          from pathlib import Path
          allowed = {
              ".github/workflows/h011-publisher-sol-audit.yml",
              "audit/H011_PUBLISHER_SOL_FINDINGS.md",
              "polymarket/h011_v3_raw_transaction.py",
              "tests/h011_v3/test_h011_v3_publish_crash_audit.py",
              "tests/h011_v3/test_h011_v3_publish_raw_scan.py",
          }
          observed = {
              line.strip()
              for line in Path("/tmp/h011-audit-names.txt").read_text().splitlines()
              if line.strip()
          }
          if not observed:
              raise SystemExit("validation PR has no changed files")
          unexpected = sorted(observed - allowed)
          if unexpected:
              raise SystemExit(f"unexpected files in validation PR: {unexpected}")
          print(f"validated scoped PR files: {sorted(observed)}")
          PY
            git diff --stat origin/feat/h011-v3-transaction-publisher...HEAD | tee /tmp/h011-audit-stat.txt
            git diff --check origin/feat/h011-v3-transaction-publisher...HEAD
          else
            test "$GITHUB_REF_NAME" = "feat/h011-v3-transaction-publisher"
            git diff --name-only HEAD^..HEAD | sort | tee /tmp/h011-audit-names.txt
            git diff --stat HEAD^..HEAD | tee /tmp/h011-audit-stat.txt
            git diff --check HEAD^..HEAD
          fi
          sha256sum \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            | tee /tmp/h011-audit-file-sha256.txt
          grep -F "4d6b859c3ac5596c9d386ceb31dbfa5f53298f526dadcba9bc177a73622b3e99  polymarket/h011_v3_raw_transaction.py" /tmp/h011-audit-file-sha256.txt
          grep -F "2ef89875d3d8aad36674d77938006402a3c24310eb689de8082861b694d29696  tests/h011_v3/test_h011_v3_publish_raw_scan.py" /tmp/h011-audit-file-sha256.txt
          git log -1 --format='%H %P %s' | tee /tmp/h011-audit-head.txt

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install H-011 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Compileall
        shell: bash
        run: |
          set -o pipefail
          python -m compileall \
            polymarket/h011_v3_raw_transaction.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            tests/h011_v3/test_h011_v3_publish_crash_audit.py \
            tests/h011_v3/test_h011_v3_raw_transaction_core.py \
            2>&1 | tee /tmp/h011-audit-compileall.log

      - name: Publisher suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_publish_raw_scan.py -q \
            2>&1 | tee /tmp/h011-audit-publisher.log

      - name: Transaction core suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_raw_transaction_core.py -q \
            2>&1 | tee /tmp/h011-audit-core.log

      - name: Hostile crash matrix
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/test_h011_v3_publish_crash_audit.py -q \
            2>&1 | tee /tmp/h011-audit-crash.log

      - name: Complete H-011 V3 suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/ -q \
            2>&1 | tee /tmp/h011-audit-h011.log

      - name: Global suite
        shell: bash
        run: |
          set +e
          set -o pipefail
          python -m pytest -q 2>&1 | tee /tmp/h011-audit-global.log
          pytest_status=${PIPESTATUS[0]}
          set -e
          if [ "$pytest_status" -eq 0 ]; then
            exit 0
          fi
          python - <<'PY'
          from pathlib import Path
          import re
          allowed = (
              "tests/cp/test_control_plane.py::TestInvariants::"
              "test_unknown_not_collapsed_to_zero"
          )
          text = Path("/tmp/h011-audit-global.log").read_text(
              encoding="utf-8", errors="replace"
          )
          failed = re.findall(r"^FAILED ([^ ]+)", text, flags=re.MULTILINE)
          if failed != [allowed] or "1 failed" not in text:
              raise SystemExit(f"unexpected global result: {failed}")
          print(f"accepted inherited out-of-scope failure: {allowed}")
          PY

      - name: FD and residue gate
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_one_hundred_publications_have_no_fd_leak \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_happy_path_sequence_zero_exact_bytes_and_cleanup \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_marker_is_removed_after_staging_and_transfer_close \
            -q 2>&1 | tee /tmp/h011-audit-fd-residue.log
          python - <<'PY' | tee /tmp/h011-audit-repository-residue.log
          from pathlib import Path
          forbidden = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              name = path.name
              if name.endswith(".marker") or ".marker.tmp." in name:
                  forbidden.append(str(path))
              if ".tmp." in name and "__pycache__" not in str(path):
                  forbidden.append(str(path))
          if forbidden:
              raise SystemExit(f"residual transaction evidence: {forbidden}")
          print("no repository marker/temp residues")
          PY

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: h011-publisher-sol-audit-${{ github.sha }}
          path: |
            /tmp/h011-audit-names.txt
            /tmp/h011-audit-file-sha256.txt
            /tmp/h011-audit-head.txt
            /tmp/h011-audit-stat.txt
            /tmp/h011-audit-compileall.log
            /tmp/h011-audit-publisher.log
            /tmp/h011-audit-core.log
            /tmp/h011-audit-crash.log
            /tmp/h011-audit-h011.log
            /tmp/h011-audit-global.log
            /tmp/h011-audit-fd-residue.log
            /tmp/h011-audit-repository-residue.log
          if-no-files-found: error
          retention-days: 7