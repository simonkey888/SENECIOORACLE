name: H011 Recovery V2 Audit Fix Push

on:
  push:
    branches:
      - feat/h011-v3-transaction-recovery-v2
    paths:
      - ".github/workflows/h011-recovery-v2-audit-fix-push.yml"

permissions:
  contents: write

concurrency:
  group: h011-recovery-v2-audit-fix-push
  cancel-in-progress: false

jobs:
  apply-fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout recovery branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: feat/h011-v3-transaction-recovery-v2
          fetch-depth: 0

      - name: Verify exact staged state
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD^)" = "d198611bde84f0e853d735f93f83a9186401bdcb"
          test "$(git diff --name-only HEAD^..HEAD)" = ".github/workflows/h011-recovery-v2-audit-fix-push.yml"
          echo "f61caba5cf419b9571be80fa09df85000879074c429d54cc8f2f0f78374abee1  polymarket/h011_v3_raw_recovery.py" | sha256sum -c -
          echo "f1a3a8e71f3e8f700e8e0f29742e7e5e58ad9c7eb93a6f612dcb7ef14631dd87  tests/h011_v3/test_h011_v3_recover_raw_transaction.py" | sha256sum -c -

      - name: Apply and validate audit fix
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_h011_recovery_v2_audit_fix.py
          python -m compileall -q \
            polymarket/h011_v3_raw_recovery.py \
            tests/h011_v3/test_h011_v3_recover_raw_transaction.py
          python -m pytest tests/h011_v3/test_h011_v3_recover_raw_transaction.py -q
          git diff --check

      - name: Commit product fix and remove temporary machinery
        shell: bash
        run: |
          set -euo pipefail
          git rm \
            .github/workflows/h011-recovery-v2-audit-fix.yml \
            .github/workflows/h011-recovery-v2-audit-fix-push.yml \
            tools/apply_h011_recovery_v2_audit_fix.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add polymarket/h011_v3_raw_recovery.py tests/h011_v3/test_h011_v3_recover_raw_transaction.py
          git commit -m "fix(h011-v3): harden recovery marker discovery"
          git push origin HEAD:feat/h011-v3-transaction-recovery-v2
