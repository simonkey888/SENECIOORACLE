name: H011 Northflank Authenticated Read-Only Push Audit

on:
  push:
    branches:
      - audit/h011-northflank-readonly-inspection
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: h011-northflank-readonly-push-audit
  cancel-in-progress: false

jobs:
  inspect:
    if: >-
      github.repository == 'simonkey888/SeneX-Prophet' &&
      github.ref == 'refs/heads/audit/h011-northflank-readonly-inspection' &&
      github.event_name == 'push'
    name: Northflank GET-only inspection
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: northflank-readonly-audit
    env:
      NORTHFLANK_API_TOKEN: ${{ secrets.NORTHFLANK_API_TOKEN }}
      EXPECTED_PR5_HEAD: aeb50867738b7ae7199f621a730080e09465458e
      EXPECTED_PR21_HEAD: 33b4eaffffc3577c52e02d407f13a6fc61777ad6
      EXPECTED_BRANCH: audit/h011-northflank-readonly-inspection
      HTTP_METHODS_ALLOWED: GET_ONLY

    steps:
      - name: Checkout exact event SHA
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Verify isolated scope and frozen heads
        shell: bash
        run: |
          set +x
          set -euo pipefail
          test "${GITHUB_REPOSITORY}" = "simonkey888/SeneX-Prophet"
          test "${GITHUB_REF}" = "refs/heads/${EXPECTED_BRANCH}"
          test "${GITHUB_EVENT_NAME}" = "push"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          test "${HTTP_METHODS_ALLOWED}" = "GET_ONLY"
          test -n "${NORTHFLANK_API_TOKEN:-}"
          echo "::add-mask::${NORTHFLANK_API_TOKEN}"
          pr5="$(git ls-remote origin refs/heads/feat/h011-v3-control-plane-coverage | awk '{print $1}')"
          pr21="$(git ls-remote origin refs/heads/feat/h011-v3-tradingview-research-bridge | awk '{print $1}')"
          test "${pr5}" = "${EXPECTED_PR5_HEAD}"
          test "${pr21}" = "${EXPECTED_PR21_HEAD}"
          git merge-base --is-ancestor "${EXPECTED_PR5_HEAD}" HEAD

      - name: Run GET-only Northflank collector
        shell: bash
        run: |
          set +x
          set -euo pipefail
          echo "::add-mask::${NORTHFLANK_API_TOKEN}"
          python scripts/northflank_readonly_audit.py

      - name: Enforce artifact privacy and GET-only ledger
        shell: bash
        run: |
          set +x
          set -euo pipefail
          echo "::add-mask::${NORTHFLANK_API_TOKEN}"
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          root = Path("evidence")
          token = os.environ["NORTHFLANK_API_TOKEN"].encode()
          forbidden = (
              "secret", "secrets", "token", "password", "authorization",
              "cookie", "credential", "credentials", "runtimeenvironment",
              "runtimefiles", "environment", "env", "value", "privatekey",
          )
          patterns = [
              re.compile(rb"nf-[A-Za-z0-9._~+/=-]{16,}"),
              re.compile(rb"gh[pousr]_[A-Za-z0-9_]{16,}"),
              re.compile(rb"\beyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b"),
              re.compile(rb"(?i)(authorization|cookie|set-cookie)\s*:"),
              re.compile(rb"(?i)(password|secret|credential|private[_-]?key|api[_-]?key)\s*[=:]"),
          ]

          def norm(key):
              return re.sub(r"[^a-z0-9]", "", str(key).lower())

          def inspect(value):
              if isinstance(value, dict):
                  for key, child in value.items():
                      if any(fragment in norm(key) for fragment in forbidden):
                          raise SystemExit(f"forbidden key: {key}")
                      inspect(child)
              elif isinstance(value, list):
                  for child in value:
                      inspect(child)

          for path in root.iterdir():
              if not path.is_file():
                  continue
              content = path.read_bytes()
              if token in content:
                  raise SystemExit(f"exact token leaked: {path}")
              for pattern in patterns:
                  if pattern.search(content):
                      raise SystemExit(f"sensitive pattern: {path}")
              if path.suffix == ".json":
                  inspect(json.loads(content.decode("utf-8")))

          report = json.loads(root.joinpath("northflank-readonly-report.json").read_text())
          if not report.get("request_ledger"):
              raise SystemExit("missing request ledger")
          if any(item.get("method") != "GET" for item in report["request_ledger"]):
              raise SystemExit("non-GET request detected")
          if report.get("mutating_requests") != 0:
              raise SystemExit("mutating request detected")
          if report.get("sensitive_values_captured") != 0:
              raise SystemExit("sensitive values captured")
          PY
          sha256sum evidence/* > evidence/SHA256SUMS

      - name: Upload sanitized evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: h011-northflank-readonly-${{ github.sha }}
          path: evidence/
          if-no-files-found: error
          retention-days: 7
