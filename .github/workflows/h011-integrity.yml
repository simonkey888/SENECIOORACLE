name: H-011 Integrity CI

on:
  push:
    branches: [audit/h011-v3-integrity-v2]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install httpx numpy fastapi uvicorn pytest

      - name: Compile all Python files
        run: |
          python -m compileall polymarket senecio_polymarket/backend

      - name: Run tests (strict — no || true)
        run: |
          pytest -q tests/h011_v3

      - name: Forbidden symbol scan
        run: |
          ! grep -r "post_order\|place_order\|submit_order\|execute_order\|private_key\|PM_PRIVATE_KEY" polymarket/ 2>/dev/null
          ! grep -r "ghp_\|nf-eyJ" polymarket/ senecio_polymarket/backend/ 2>/dev/null
