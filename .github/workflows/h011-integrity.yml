name: H-011 Integrity CI

on:
  push:
    branches: [audit/h011-v3-integrity-v2]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx numpy fastapi uvicorn pytest

      - name: Compile all Python files
        run: python -m compileall polymarket senecio_polymarket/backend

      - name: Run H-011 V3 tests
        env:
          # Tests import V3 modules directly and through their package names.
          # Keep the repository root discoverable for both import styles.
          PYTHONPATH: .
        run: pytest -q tests/h011_v3 tests/cp

      - name: Forbidden symbol scan
        run: |
          ! grep -r "post_order\|place_order\|submit_order\|execute_order\|private_key\|PM_PRIVATE_KEY\|ghp_\|nf-eyJ" polymarket/ senecio_polymarket/backend/ 2>/dev/null
