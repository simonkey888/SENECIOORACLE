name: H011 Publisher SOL Audit V2

on:
  push:
    branches:
      - audit/h011-v3-publisher-sol
  pull_request:
    branches:
      - feat/h011-v3-transaction-publisher

permissions:
  contents: read

jobs:
  materialized-publisher-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout exact event head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Verify materialized state and scope
        shell: bash
        run: |
          set -euo pipefail
          test ! -e tools/apply_h011_publisher_audit_patch.py
          git fetch --no-tags origin feat/h011-v3-transaction-publisher
          git diff --name-only origin/feat/h011-v3-transaction-publisher...HEAD | sort | tee /tmp/h011-audit-names.txt
          test "$(cat /tmp/h011-audit-names.txt)" = $'.github/workflows/h011-publisher-sol-audit-v2.yml\n.github/workflows/h011-publisher-sol-audit.yml\naudit/H011_PUBLISHER_SOL_FINDINGS.md\npolymarket/h011_v3_raw_transaction.py\ntests/h011_v3/test_h011_v3_publish_crash_audit.py\ntests/h011_v3/test_h011_v3_publish_raw_scan.py'
          sha256sum polymarket/h011_v3_raw_transaction.py tests/h011_v3/test_h011_v3_publish_raw_scan.py | tee /tmp/h011-audit-file-sha256.txt
          grep -F "4d6b859c3ac5596c9d386ceb31dbfa5f53298f526dadcba9bc177a73622b3e99  polymarket/h011_v3_raw_transaction.py" /tmp/h011-audit-file-sha256.txt
          grep -F "2ef89875d3d8aad36674d77938006402a3c24310eb689de8082861b694d29696  tests/h011_v3/test_h011_v3_publish_raw_scan.py" /tmp/h011-audit-file-sha256.txt
          git diff --check origin/feat/h011-v3-transaction-publisher...HEAD

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Compileall
        run: python -m compileall polymarket/h011_v3_raw_transaction.py tests/h011_v3/test_h011_v3_publish_raw_scan.py tests/h011_v3/test_h011_v3_publish_crash_audit.py tests/h011_v3/test_h011_v3_raw_transaction_core.py

      - name: Publisher suite
        run: python -m pytest tests/h011_v3/test_h011_v3_publish_raw_scan.py -q

      - name: Transaction core suite
        run: python -m pytest tests/h011_v3/test_h011_v3_raw_transaction_core.py -q

      - name: Hostile crash matrix
        run: python -m pytest tests/h011_v3/test_h011_v3_publish_crash_audit.py -q

      - name: Complete H-011 V3 suite
        run: python -m pytest tests/h011_v3/ -q

      - name: Global suite
        shell: bash
        run: |
          set +e
          python -m pytest -q 2>&1 | tee /tmp/h011-audit-global.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then exit 0; fi
          python - <<'PY'
          from pathlib import Path
          import re
          allowed = "tests/cp/test_control_plane.py::TestInvariants::test_unknown_not_collapsed_to_zero"
          text = Path("/tmp/h011-audit-global.log").read_text(encoding="utf-8", errors="replace")
          failed = re.findall(r"^FAILED ([^ ]+)", text, flags=re.MULTILINE)
          if failed != [allowed] or "1 failed" not in text:
              raise SystemExit(f"unexpected global result: {failed}")
          print(f"accepted inherited out-of-scope failure: {allowed}")
          PY

      - name: FD and residue gate
        shell: bash
        run: |
          python -m pytest tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_one_hundred_publications_have_no_fd_leak tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_happy_path_sequence_zero_exact_bytes_and_cleanup tests/h011_v3/test_h011_v3_publish_raw_scan.py::test_marker_is_removed_after_staging_and_transfer_close -q
          python - <<'PY'
          from pathlib import Path
          forbidden = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              name = path.name
              if name.endswith(".marker") or ".marker.tmp." in name:
                  forbidden.append(str(path))
              if ".tmp." in name and "__pycache__" not in str(path):
                  forbidden.append(str(path))
          if forbidden:
              raise SystemExit(f"residual transaction evidence: {forbidden}")
          print("no repository marker/temp residues")
          PY
