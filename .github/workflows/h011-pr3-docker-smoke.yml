name: H011 PR3 Docker Smoke

on:
  pull_request:
    branches:
      - feat/h011-v3-discovery-refresh
    paths:
      - "polymarket/**"
      - "tests/h011_v3/**"
      - ".github/workflows/h011-pr3-docker-smoke.yml"

permissions:
  contents: read

concurrency:
  group: h011-pr3-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  docker-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Run H011 tests
        run: |
          python -m pip install --upgrade pip
          pip install -r polymarket/requirements-h011-v3.txt
          python -m pytest tests/h011_v3/ -q

      - name: Build H011 Docker image
        run: |
          docker build \
            -f polymarket/Dockerfile.h011-v3 \
            -t senecio-h011-pr3:${{ github.sha }} \
            .

      - name: Start container
        run: |
          mkdir -p "${RUNNER_TEMP}/h011-results"

          docker run -d \
            --name senecio-h011-pr3 \
            -p 18080:8080 \
            -v "${RUNNER_TEMP}/h011-results:/app/polymarket/results" \
            -e SENECIO_CODE_SHA="${{ github.sha }}" \
            -e H011_PIPELINE_VERSION="integrity-v3" \
            -e PYTHONUNBUFFERED="1" \
            senecio-h011-pr3:${{ github.sha }}

      - name: Wait for health
        run: |
          healthy=0

          for i in $(seq 1 90); do
            if curl --fail --silent --show-error \
              http://127.0.0.1:18080/healthz; then
              healthy=1
              break
            fi

            if ! docker inspect -f '{{.State.Running}}' senecio-h011-pr3 \
              | grep -q true; then
              echo "Container stopped unexpectedly"
              docker logs senecio-h011-pr3
              exit 1
            fi

            sleep 2
          done

          if [ "$healthy" -ne 1 ]; then
            echo "Health endpoint did not become ready"
            docker logs senecio-h011-pr3
            exit 1
          fi

      - name: Validate runtime safety flags
        run: |
          for i in $(seq 1 90); do
            if curl --fail --silent \
              http://127.0.0.1:18080/api/v3/state \
              -o /tmp/h011-state.json; then
              break
            fi
            sleep 2
          done

          cat /tmp/h011-state.json

          python - <<'PY'
          import json
          from pathlib import Path

          state_path = Path("/tmp/h011-state.json")
          if not state_path.exists():
              raise SystemExit("Missing /api/v3/state response")

          state = json.loads(state_path.read_text())

          assert state.get("paper_only") is True, state
          assert state.get("live_capital_locked") is True, state
          assert state.get("orders_enabled") is False, state

          print("Runtime safety flags verified")
          PY

      - name: Wait for one discovery artifact
        run: |
          artifact=""

          for i in $(seq 1 180); do
            artifact="$(find "${RUNNER_TEMP}/h011-results" \
              -type f \
              \( -name 'discovery_*.json.gz' -o -name '*.events.jsonl.gz' \) \
              | head -n 1)"

            if [ -n "$artifact" ]; then
              break
            fi

            if ! docker inspect -f '{{.State.Running}}' senecio-h011-pr3 \
              | grep -q true; then
              echo "Container stopped during discovery"
              docker logs senecio-h011-pr3
              exit 1
            fi

            sleep 2
          done

          if [ -z "$artifact" ]; then
            echo "No discovery/raw artifact generated"
            docker logs senecio-h011-pr3
            exit 1
          fi

          echo "Artifact generated: $artifact"

          sha_file="${artifact}.sha256"
          if [ -f "$sha_file" ]; then
            expected="$(tr -d '[:space:]' < "$sha_file")"
            actual="$(sha256sum "$artifact" | awk '{print $1}')"
            test "$expected" = "$actual"
            echo "Artifact SHA verified"
          fi

      - name: Check logs and filesystem
        run: |
          docker logs senecio-h011-pr3 | tee /tmp/h011-container.log

          ! grep -Ei \
            'orders_enabled[=: ]+true|live_capital_locked[=: ]+false|paper_only[=: ]+false' \
            /tmp/h011-container.log

          test "$(docker inspect -f '{{.State.Running}}' senecio-h011-pr3)" = "true"

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: h011-pr3-smoke-${{ github.sha }}
          path: |
            /tmp/h011-container.log
            /tmp/h011-state.json
            ${{ runner.temp }}/h011-results
          if-no-files-found: warn
          retention-days: 7

      - name: Stop container
        if: always()
        run: |
          docker rm -f senecio-h011-pr3 2>/dev/null || true
