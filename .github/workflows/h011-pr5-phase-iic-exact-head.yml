name: H011 PR5 Phase II-C Exact Head

on:
  push:
    branches:
      - feat/h011-v3-control-plane-coverage
    paths:
      - "polymarket/**"
      - "tests/**"
      - "docs/CURRENT_STATE.md"
      - "research/H-011_v3_raw_artifact_transaction_design.md"
      - ".github/workflows/h011-pr5-phase-iic-exact-head.yml"

permissions:
  contents: read

concurrency:
  group: h011-pr5-phase-iic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phase-iic:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Verify exact head, base, and diff
        shell: bash
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          expected="${{ github.sha }}"
          test "$actual" = "$expected"
          test "${{ github.ref_name }}" = "feat/h011-v3-control-plane-coverage"
          base="$(git merge-base origin/feat/h011-v3-discovery-refresh "$expected")"
          test -n "$base"
          git log -1 --format='%H %P %s' | tee /tmp/h011-iic-head.txt
          git diff --name-status "$base...$expected" \
            | tee /tmp/h011-iic-scope.txt
          git diff --stat "$base...$expected" \
            | tee /tmp/h011-iic-stat.txt
          git diff --check "$base...$expected" \
            | tee /tmp/h011-iic-diff-check.txt

      - name: Package exact checkout
        shell: bash
        run: |
          set -euo pipefail
          tar -czf /tmp/senex-phase-iic-exact-checkout.tar.gz .
          sha256sum /tmp/senex-phase-iic-exact-checkout.tar.gz \
            | tee /tmp/h011-iic-source-sha256.txt

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: polymarket/requirements-h011-v3.txt

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r polymarket/requirements-h011-v3.txt

      - name: Compile repository Python
        shell: bash
        run: |
          set -o pipefail
          python -m compileall polymarket tests 2>&1 | tee /tmp/h011-iic-compileall.log

      - name: Host filesystem capability probe
        shell: bash
        run: |
          set -o pipefail
          mkdir -p "${RUNNER_TEMP}/senex-fs-probe-parent"
          python polymarket/h011_v3_fs_probe.py \
            "${RUNNER_TEMP}/senex-fs-probe-parent" \
            --output /tmp/h011-iic-host-fs-probe.json \
            2>&1 | tee /tmp/h011-iic-host-fs-probe.log
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/h011-iic-host-fs-probe.json').read_text())
          assert data['storage_compatible'] is True, data
          required = {
              'flock', 'hardlink', 'rename_exchange', 'file_fsync',
              'directory_fsync', 'o_nofollow', 'chmod_0444',
              'inode_stability', 'process_restart_persistence', 'same_filesystem',
          }
          assert required.issubset(data['checks'])
          assert all(data['checks'][name]['pass'] for name in required)
          PY

      - name: Phase II-C focused tests
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/cp/test_invariant_compatibility.py \
            tests/cp/test_control_plane.py::TestInvariants \
            tests/h011_v3/test_run_scan_integration.py \
            tests/h011_v3/test_h011_v3_committed_snapshot.py \
            tests/h011_v3/test_h011_v3_dashboard_committed.py \
            tests/h011_v3/test_h011_v3_fs_probe.py \
            tests/h011_v3/test_h011_v3_runtime_integration.py \
            -q 2>&1 | tee /tmp/h011-iic-focused.log
          ! grep -Eq '[0-9]+ skipped' /tmp/h011-iic-focused.log

      - name: Transaction core and publisher regression
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/h011_v3/test_h011_v3_raw_transaction_core.py \
            tests/h011_v3/test_h011_v3_publish_raw_scan.py \
            tests/h011_v3/test_h011_v3_publish_crash_audit.py \
            tests/h011_v3/test_h011_v3_recover_raw_transaction.py \
            -q 2>&1 | tee /tmp/h011-iic-transaction-regression.log

      - name: Complete H-011 suite
        shell: bash
        run: |
          set -o pipefail
          python -m pytest tests/h011_v3/ -q 2>&1 | tee /tmp/h011-iic-h011.log

      - name: Global suite — zero failures
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q 2>&1 | tee /tmp/h011-iic-global.log

      - name: Build exact-head Docker image
        shell: bash
        run: |
          set -o pipefail
          docker build \
            -f polymarket/Dockerfile.h011-v3 \
            -t senex-h011-iic:${{ github.sha }} \
            . 2>&1 | tee /tmp/h011-iic-docker-build.log

      - name: Verify Docker module completeness
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            senex-h011-iic:${{ github.sha }} \
            python3 -c 'import h011_v3_raw_transaction,h011_v3_raw_recovery,h011_v3_runtime,h011_v3_committed_snapshot,h011_v3_pipeline,dashboard_v3; print("module completeness PASS")' \
            | tee /tmp/h011-iic-docker-modules.log

      - name: Container filesystem capability probe
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/senex-container-fs"
          docker run --rm \
            -v "${RUNNER_TEMP}/senex-container-fs:/probe" \
            senex-h011-iic:${{ github.sha }} \
            python3 /app/polymarket/h011_v3_fs_probe.py /probe \
            | tee /tmp/h011-iic-container-fs-probe.json
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/h011-iic-container-fs-probe.json').read_text())
          assert data['storage_compatible'] is True, data
          PY

      - name: Create committed synthetic scan in shared volume
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/senex-runtime-volume"
          docker run --rm \
            -v "${RUNNER_TEMP}/senex-runtime-volume:/app/polymarket/results" \
            -e SENECIO_CODE_SHA="${{ github.sha }}" \
            senex-h011-iic:${{ github.sha }} \
            python3 /app/polymarket/h011_v3_runtime.py \
              --synthetic-publish --run-id docker-baseline-run --scan-id docker-baseline-scan \
            | tee /tmp/h011-iic-synthetic-publish.log

      - name: Start controlled runtime and validate APIs
        shell: bash
        run: |
          set -euo pipefail
          docker run -d \
            --name senex-h011-iic \
            -p 18080:8080 \
            -v "${RUNNER_TEMP}/senex-runtime-volume:/app/polymarket/results" \
            -e SENECIO_CODE_SHA="${{ github.sha }}" \
            -e H011_RUNTIME_DIAGNOSTIC_ONLY=true \
            -e PYTHONUNBUFFERED=1 \
            senex-h011-iic:${{ github.sha }}

          ready=0
          for _ in $(seq 1 90); do
            if curl --fail --silent http://127.0.0.1:18080/readyz \
              -o /tmp/h011-iic-ready.json; then
              ready=1
              break
            fi
            if ! test "$(docker inspect -f '{{.State.Running}}' senex-h011-iic)" = true; then
              docker logs senex-h011-iic | tee /tmp/h011-iic-container.log
              exit 1
            fi
            sleep 2
          done
          test "$ready" = 1
          curl --fail --silent http://127.0.0.1:18080/livez -o /tmp/h011-iic-live.json
          curl --fail --silent http://127.0.0.1:18080/healthz -o /tmp/h011-iic-health.json
          curl --fail --silent http://127.0.0.1:18080/api/v3/state -o /tmp/h011-iic-state.json
          curl --fail --silent http://127.0.0.1:18080/api/v3/integrity -o /tmp/h011-iic-integrity.json
          curl --fail --silent http://127.0.0.1:18080/api/v3/replay -o /tmp/h011-iic-replay.json
          docker logs senex-h011-iic | tee /tmp/h011-iic-container.log

          python - <<'PY'
          import json
          from pathlib import Path
          state = json.loads(Path('/tmp/h011-iic-state.json').read_text())
          health = json.loads(Path('/tmp/h011-iic-health.json').read_text())
          integrity = json.loads(Path('/tmp/h011-iic-integrity.json').read_text())
          replay = json.loads(Path('/tmp/h011-iic-replay.json').read_text())
          assert state['paper_only'] is True
          assert state['orders_enabled'] is False
          assert state['live_capital_locked'] is True
          assert state['runtime']['runtime_state'] == 'DEGRADED'
          assert state['runtime']['blocking_reason'] == 'diagnostic_only_mode'
          summary = state['invariants']['summary']
          assert summary['total'] == 31, summary
          assert summary['fail'] == 0, summary
          assert summary['unknown'] == 0, summary
          assert state['raw_chain']['chain_verified'] is True
          assert state['raw_chain']['current_sequence'] == 0
          assert health['ok'] is True
          assert health['status'] == 'DEGRADED'
          assert health['snapshot_age_sec'] is not None
          assert integrity['chain_verified'] is True
          assert integrity['replay_verified'] is True
          assert integrity['legacy_mode'] is False
          assert replay['chain_verified'] is True
          assert replay['replay_verified'] is True
          assert replay['replay_contract'] == 'strict_committed_raw_chain_v1'
          PY

      - name: Validate SIGTERM shutdown
        shell: bash
        run: |
          set -euo pipefail
          docker stop --time 15 senex-h011-iic | tee /tmp/h011-iic-stop.log
          docker logs senex-h011-iic >> /tmp/h011-iic-container.log 2>&1 || true
          docker rm senex-h011-iic >/dev/null

      - name: Docker crash and same-volume restart matrix
        shell: bash
        run: |
          set -euo pipefail
          image="senex-h011-iic:${{ github.sha }}"
          : > /tmp/h011-iic-crash-matrix.log
          points=(
            PUBLISH_AFTER_STAGED_MARKER
            PUBLISH_AFTER_ARTIFACT_MARKER_UPDATE
            PUBLISH_AFTER_SIDECAR_MARKER_UPDATE
            PUBLISH_AFTER_MANIFEST_MARKER_UPDATE
            PUBLISH_AFTER_COMMITTED_MARKER
            PUBLISH_AFTER_STAGING_UNLINK
            PUBLISH_AFTER_MARKER_UNLINK
          )
          for point in "${points[@]}"; do
            case_dir="${RUNNER_TEMP}/senex-crash-${point,,}"
            mkdir -p "$case_dir"
            set +e
            docker run --rm \
              -v "$case_dir:/app/polymarket/results" \
              "$image" \
              python3 /app/polymarket/h011_v3_runtime.py \
                --synthetic-publish \
                --run-id "run-${point,,}" \
                --scan-id "scan-${point,,}" \
                --fault-point "$point" \
              >> /tmp/h011-iic-crash-matrix.log 2>&1
            crash_rc=$?
            set -e
            test "$crash_rc" = 99

            docker run --rm \
              -v "$case_dir:/app/polymarket/results" \
              "$image" \
              python3 /app/polymarket/h011_v3_runtime.py --startup-check \
              >> /tmp/h011-iic-crash-matrix.log 2>&1

            docker run --rm -i \
              -v "$case_dir:/app/polymarket/results" \
              "$image" \
              python3 - <<'PY' \
              >> /tmp/h011-iic-crash-matrix.log 2>&1
          from pathlib import Path
          from h011_v3_committed_snapshot import validate_committed_chain
          root = Path('/app/polymarket/results/h011_v3/raw_chain_v1')
          chain = validate_committed_chain(root)
          assert chain.chain_verified is True
          assert chain.latest is not None
          assert not list(root.glob('*.marker'))
          assert not list(root.glob('*.marker.tmp.*'))
          pending = root / '.pending'
          assert not pending.exists() or not list(pending.iterdir())
          print(chain.to_dict())
          PY
            echo "$point PASS" | tee -a /tmp/h011-iic-crash-matrix.log
          done
          test "$(grep -c ' PASS$' /tmp/h011-iic-crash-matrix.log)" = 7

      - name: Final residue and safety gate
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY' | tee /tmp/h011-iic-residue.log
          from pathlib import Path
          roots = [
              Path('${{ runner.temp }}/senex-runtime-volume'),
              *Path('${{ runner.temp }}').glob('senex-crash-*'),
          ]
          forbidden = []
          for root in roots:
              if not root.exists():
                  continue
              for path in root.rglob('*'):
                  if not path.is_file():
                      continue
                  name = path.name
                  if name.endswith('.marker') or '.marker.tmp.' in name:
                      forbidden.append(str(path))
          if forbidden:
              raise SystemExit(f'unresolved marker evidence: {forbidden}')
          print('unresolved marker/temp residue: 0')
          PY
          ! grep -R -E 'orders_enabled[=: ]+true|paper_only[=: ]+false|live_capital_locked[=: ]+false' \
            "${RUNNER_TEMP}/senex-runtime-volume" /tmp/h011-iic-*.log

      - name: Checksums
        if: always()
        shell: bash
        run: |
          sha256sum \
            polymarket/h011_v3_raw_transaction.py \
            polymarket/h011_v3_raw_recovery.py \
            polymarket/h011_v3_runtime.py \
            polymarket/h011_v3_committed_snapshot.py \
            polymarket/h011_v3_pipeline.py \
            polymarket/dashboard_v3.py \
            polymarket/Dockerfile.h011-v3 \
            | tee /tmp/h011-iic-file-sha256.txt

      - name: Upload Phase II-C evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: h011-pr5-phase-iic-${{ github.sha }}
          path: |
            /tmp/h011-iic-*.txt
            /tmp/h011-iic-*.log
            /tmp/h011-iic-*.json
            /tmp/senex-phase-iic-exact-checkout.tar.gz
            ${{ runner.temp }}/senex-runtime-volume
            ${{ runner.temp }}/senex-crash-*
          if-no-files-found: warn
          retention-days: 14

      - name: Cleanup container
        if: always()
        run: docker rm -f senex-h011-iic 2>/dev/null || true
