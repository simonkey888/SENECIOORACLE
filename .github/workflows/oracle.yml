# SENECIO Oracle Cycle — Automated Prediction Pipeline
name: SENECIO Oracle Cycle

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ccxt

      - name: Run Oracle — ETH/USDT
        run: |
          echo "=== SENECIO ORACLE — $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
          python3 predict_only.py --symbol ETH/USDT --timeframe 15m --exchange binanceus --json 2>&1 | tee oracle_cycle.log
          echo ""
          echo "=== Predictions count ==="
          wc -l senecio_output/predictions.jsonl

      - name: Run Oracle — BTC/USDT
        run: |
          python3 predict_only.py --symbol BTC/USDT --timeframe 15m --exchange binanceus --json 2>&1 | tee oracle_cycle_btc.log || true

      - name: Generate Oracle Lab report
        run: |
          python3 oracle_lab.py 2>&1 | tee oracle_lab.log || true

      - name: Commit and push predictions
        run: |
          git config user.name "SENECIO Oracle"
          git config user.email "oracle@senecio.bot"
          git add senecio_output/predictions.jsonl senecio_output/oracle_report.json senecio_output/oracle_report.md
          git diff --cached --quiet && echo "No new predictions to commit" && exit 0
          git commit -m "oracle: prediction cycle $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
