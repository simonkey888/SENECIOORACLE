# SENECIO Oracle Cycle — Automated Prediction Pipeline
name: SENECIO Oracle Cycle

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ccxt

      - name: Verify past predictions
        run: |
          echo "=== VERIFY — filling outcomes for past predictions ==="
          python3 predict_only.py --verify --symbol ETH/USDT --exchange okx 2>&1 || true
          python3 predict_only.py --verify --symbol BTC/USDT --exchange okx 2>&1 || true

      - name: Run Oracle — ETH/USDT
        run: |
          echo "=== SENECIO ORACLE — $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
          python3 predict_only.py --symbol ETH/USDT --timeframe 15m --exchange okx --json 2>&1 | tee oracle_cycle.log

      - name: Run Oracle — BTC/USDT
        run: |
          python3 predict_only.py --symbol BTC/USDT --timeframe 15m --exchange okx --json 2>&1 | tee oracle_cycle_btc.log || true

      - name: Data quality gate — remove garbage entries
        run: |
          python3 -c "
          import json
          with open('senecio_output/predictions.jsonl') as f:
              lines = [l.strip() for l in f if l.strip()]
          clean = []
          removed = 0
          for line in lines:
              p = json.loads(line)
              if p.get('price_now', 0) == 0 and p.get('confidence', 0) == 0:
                  removed += 1
              else:
                  clean.append(line)
          if removed > 0:
              with open('senecio_output/predictions.jsonl', 'w') as f:
                  for line in clean:
                      f.write(line + '\n')
              print(f'Data quality gate: removed {removed} garbage, kept {len(clean)}')
          else:
              print(f'Data quality gate: all {len(clean)} entries clean')
          "

      - name: Health check — verify new predictions exist
        run: |
          python3 -c "
          import json
          from datetime import datetime, timezone, timedelta
          with open('senecio_output/predictions.jsonl') as f:
              preds = [json.loads(l.strip()) for l in f if l.strip()]
          now = datetime.now(timezone.utc)
          one_hour_ago = now - timedelta(hours=1)
          recent = [p for p in preds
                    if p.get('timestamp') and
                    datetime.fromisoformat(p['timestamp'].replace('Z','+00:00')) > one_hour_ago
                    and p.get('price_now', 0) > 0]
          if len(recent) == 0:
              print(f'HEALTH CHECK FAILED: No valid predictions in the last hour')
              print(f'Total predictions: {len(preds)}, Recent valid: {len(recent)}')
              exit(1)
          else:
              print(f'HEALTH CHECK OK: {len(recent)} valid prediction(s) in the last hour')
          "

      - name: Generate Oracle Lab report
        run: |
          python3 oracle_lab.py 2>&1 | tee oracle_lab.log || true

      - name: Commit and push predictions + dashboard
        run: |
          git config user.name "SENECIO Oracle"
          git config user.email "oracle@senecio.bot"
          git add senecio_output/predictions.jsonl senecio_output/oracle_report.json senecio_output/oracle_report.md index.html
          git diff --cached --quiet && echo "No new predictions to commit" && exit 0
          git commit -m "oracle: prediction cycle $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
