# SENECIO ORACLE — Fly.io config (v2 — fixed for first deploy)
# Free-tier friendly: shared-cpu-1x, 256MB RAM, single machine in ams
app = "seneciooracle"
primary_region = "ams"

[build]
  # Build context = repo root. Dockerfile path relative to repo root.
  dockerfile = "senecio_polymarket/Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 500

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "30s"   # longer grace — Python cold start + history seed takes ~5-10s
  method = "GET"
  path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# NOTE: [mounts] removed for first deploy — volume needs to be created manually
# via `fly volumes create senecio_data --region ams --size 1` BEFORE deploying.
# Without that, Fly fails the machine on boot. The app still works without it
# (audit JSONL writes to /app/data/audit which the Dockerfile creates).
# Add the mount back AFTER creating the volume.
