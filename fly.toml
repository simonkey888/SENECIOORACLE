# fly.toml app configuration file generated for seneciooracle on 2026-06-17T18:48:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'seneciooracle'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 500
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
